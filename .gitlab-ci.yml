stages:
  - setup
  - lint
  - security
  - build
  - test

services:
  - docker:dind

variables:
  DOCKER_TLS_CERTDIR: ""
  DOCKER_HOST: tcp://docker:2375
  PYTHON_IMAGE: python:3.11-slim

# ------------------------------------------------------------
# Setup
# ------------------------------------------------------------
setup:
  stage: setup
  image: $PYTHON_IMAGE
  script:
    - pip install --upgrade pip
    - pip install -r requirements.txt
  cache:
    key: ${CI_COMMIT_REF_SLUG}-pip
    paths:
      - ~/.cache/pip
    policy: pull-push
  only:
    - merge_requests
    - branches

# ------------------------------------------------------------
# Lint
# ------------------------------------------------------------
lint:
  stage: lint
  image: $PYTHON_IMAGE
  script:
    - pip install ruff
    - ruff check .
  cache:
    key: ${CI_COMMIT_REF_SLUG}-pip
    paths:
      - ~/.cache/pip
    policy: pull
  needs:
    - setup
  only:
    - merge_requests
    - branches

# ------------------------------------------------------------
# Security
# ------------------------------------------------------------
security_scan:
  stage: security
  image: $PYTHON_IMAGE
  script:
    # Upgrade system tools to remove known vulnerabilities
    - pip install --upgrade pip wheel
    # Install and run the scanner
    - pip install pip-audit
    - pip-audit
  cache:
    key: ${CI_COMMIT_REF_SLUG}-pip
    paths:
      - ~/.cache/pip
    policy: pull
  needs:
    - setup
  only:
    - merge_requests
    - branches

# ------------------------------------------------------------
# Build
# ------------------------------------------------------------
build:
  stage: build
  image: docker:latest
  script:
    - docker-compose build
  only:
    - merge_requests
    - branches

# ------------------------------------------------------------
# Integration test
# ------------------------------------------------------------
integration_test:
  stage: test
  image: $PYTHON_IMAGE
  variables:
    JWT_SECRET_KEY: $JWT_SECRET_KEY
    POSTGRES_USER: $POSTGRES_USER
    POSTGRES_PASSWORD: $POSTGRES_PASSWORD
    POSTGRES_HOST: $POSTGRES_HOST
    POSTGRES_DB: $POSTGRES_DB
    REDIS_HOST: $REDIS_HOST
    AUTH_URL: http://docker:8001
    ACCOUNT_URL: http://docker:8002
    TRANSACTION_URL: http://docker:8003
    ADMIN_URL: http://docker:8004
  cache:
    key: ${CI_COMMIT_REF_SLUG}-pip
    paths:
      - ~/.cache/pip
    policy: pull
  before_script:
    # Install tools and dependencies
    - apt-get update && apt-get install -y docker-compose curl
    - pip install -r requirements.txt

    # -----------------------------------------------------------
    # 1. Run database migrations (blocking)
    # -----------------------------------------------------------
    - echo "🗃️ Running database migrations..."
    - docker-compose run --rm db-migrate

    # -----------------------------------------------------------
    # 2. Start all other services (migration already done)
    # -----------------------------------------------------------
    - echo "🚀 Launching services..."
    - docker-compose up -d

    # -----------------------------------------------------------
    # 3. Wait for API services to be healthy
    # -----------------------------------------------------------
    - echo "⏳ Waiting for services..."
    - for url in $AUTH_URL $ACCOUNT_URL $TRANSACTION_URL $ADMIN_URL; do echo "Checking $url"; for i in $(seq 1 30); do if curl -s "$url/docs" > /dev/null; then echo "✅ $url ready"; break; fi; sleep 2; done; done
  script:
    - python tests/integration_test.py
  after_script:
    - docker-compose down -v --remove-orphans
  needs:
    - build
  only:
    - merge_requests
    - branches