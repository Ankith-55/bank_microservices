stages:
  - setup
  - lint
  - security
  - build
  - test

services:
  - docker:dind

variables:
  DOCKER_TLS_CERTDIR: ""
  DOCKER_HOST: tcp://docker:2375
  PYTHON_IMAGE: python:3.11-slim

# ------------------------------------------------------------
# Setup
# ------------------------------------------------------------
setup:
  stage: setup
  image: $PYTHON_IMAGE
  script:
    - pip install --upgrade pip
    - pip install -r requirements.txt
  cache:
    key: ${CI_COMMIT_REF_SLUG}-pip
    paths:
      - ~/.cache/pip
    policy: pull-push
  only:
    - merge_requests
    - branches

# ------------------------------------------------------------
# Lint
# ------------------------------------------------------------
lint:
  stage: lint
  image: $PYTHON_IMAGE
  script:
    - pip install ruff
    - ruff check .
  cache:
    key: ${CI_COMMIT_REF_SLUG}-pip
    paths:
      - ~/.cache/pip
    policy: pull
  needs:
    - setup
  only:
    - merge_requests
    - branches

# ------------------------------------------------------------
# Security
# ------------------------------------------------------------
security_scan:
  stage: security
  image: $PYTHON_IMAGE
  script:
    # Upgrade system tools to remove known vulnerabilities
    - pip install --upgrade pip wheel
    # Install and run the scanner
    - pip install pip-audit
    - pip-audit
  cache:
    key: ${CI_COMMIT_REF_SLUG}-pip
    paths:
      - ~/.cache/pip
    policy: pull
  needs:
    - setup
  only:
    - merge_requests
    - branches

# ------------------------------------------------------------
# Build
# ------------------------------------------------------------
build:
  stage: build
  image: docker:latest
  script:
    - docker-compose build
  only:
    - merge_requests
    - branches

# ------------------------------------------------------------
# Integration test
# ------------------------------------------------------------
# Done in stagin, not production, so we can use a separate job for integration tests.