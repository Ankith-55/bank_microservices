# .gitlab-ci.yml — MicroBank CI/CD Pipeline
# ==========================================
stages:
  - setup
  - lint
  - security
  - build
  - test

# -------------------------------------------------------------------
# Global settings
# -------------------------------------------------------------------
services:
  - docker:dind

variables:
  DOCKER_TLS_CERTDIR: ""
  DOCKER_HOST: tcp://docker:2375
  PYTHON_IMAGE: python:3.11-slim

# -------------------------------------------------------------------
# Stage 1 — Setup environment (write access to cache)
# -------------------------------------------------------------------
setup:
  stage: setup
  image: $PYTHON_IMAGE
  script:
    - pip install --upgrade pip
    - pip install -r requirements.txt
  cache:
    key: ${CI_COMMIT_REF_SLUG}-pip
    paths:
      - ~/.cache/pip
    policy: pull-push          # write to the cache
  only:
    - merge_requests
    - branches

# -------------------------------------------------------------------
# Stage 2 — Lint & Format (Ruff) – read-only cache
# -------------------------------------------------------------------
lint:
  stage: lint
  image: $PYTHON_IMAGE
  script:
    - pip install ruff
    - ruff check .
    - ruff format --check .
  cache:
    key: ${CI_COMMIT_REF_SLUG}-pip   # same key as setup
    paths:
      - ~/.cache/pip
    policy: pull                     # only read
  needs: [setup]
  only:
    - merge_requests
    - branches

# -------------------------------------------------------------------
# Stage 3 — Security scan (pip‑audit) – read-only cache
# -------------------------------------------------------------------
security_scan:
  stage: security
  image: $PYTHON_IMAGE
  script:
    - pip install pip-audit
    - pip-audit
  cache:
    key: ${CI_COMMIT_REF_SLUG}-pip
    paths:
      - ~/.cache/pip
    policy: pull
  needs: [setup]
  only:
    - merge_requests
    - branches

# -------------------------------------------------------------------
# Stage 4 — Build Docker images
# -------------------------------------------------------------------
build:
  stage: build
  image: docker:latest
  script:
    - docker-compose build
  only:
    - merge_requests
    - branches

# -------------------------------------------------------------------
# Stage 5 — Integration tests (start, wait, test, cleanup)
# -------------------------------------------------------------------
integration_test:
  stage: test
  image: $PYTHON_IMAGE
  variables:
    AUTH_URL: http://docker:8001
    ACCOUNT_URL: http://docker:8002
    TRANSACTION_URL: http://docker:8003
    ADMIN_URL: http://docker:8004
    # ADMIN_EMAIL and ADMIN_PASSWORD are set in GitLab CI/CD Variables
  before_script:
    - apt-get update && apt-get install -y docker-compose curl
    - echo "🚀 Launching all services..."
    - docker-compose up -d
    - echo "⏳ Waiting for services..."
    - |
      for url in $AUTH_URL $ACCOUNT_URL $TRANSACTION_URL $ADMIN_URL; do
        for i in $(seq 1 30); do
          if curl -s "$url/docs" > /dev/null; then
            echo "✅ $url ready"
            break
          fi
          sleep 2
        done
      done
  script:
    - python tests/integration_test.py
  after_script:
    - docker-compose down -v --remove-orphans
  needs: [build]
  only:
    - merge_requests
    - branches